<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Membership | Vrime Heritage</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9e29c 45%, #b8860b 70%, #f9e29c 100%);
            --dark-bg: #0a0a0a;
        }

        body { 
            background: var(--dark-bg); 
            color: #e0e0e0; 
            font-family: 'Playfair Display', serif; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
        }

        .page-wrap { 
            min-height: 100vh; 
            width: 100%;
            max-width: 500px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 60px 20px; 
            text-align: center;
        }

        /* Gold Shimmer Animation */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .luxury-card { 
            background: var(--gold);
            background-size: 200% auto;
            animation: shimmer 6s linear infinite;
            width: 100%; 
            height: 240px; 
            border-radius: 2px; /* Sharp edges feel more architectural/luxury */
            padding: 2px; /* Border effect */
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
            margin-bottom: 50px;
        }

        .card-inner {
            background: #111;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-photo { 
            width: 130px; 
            height: 170px; 
            border: 1px solid #d4af37;
            overflow: hidden; 
            filter: grayscale(20%) contrast(110%);
        }

        .main-photo img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { 
            flex: 1;
            text-align: right;
            padding-left: 20px;
        }

        .card-info h2 { 
            font-size: 1.8rem; 
            margin: 0; 
            color: #d4af37;
            letter-spacing: 1px;
        }

        .card-info p {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-top: 5px;
        }

        .btn-luxury { 
            background: none;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 18px 40px; 
            letter-spacing: 4px;
            font-weight: 300;
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.4s;
            margin-top: 20px;
        }

        .btn-luxury:hover {
            background: #d4af37;
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .glass-input { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .section { display: none; }
        .active { display: flex; }
        .active-block { display: block; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="step-landing" class="page-wrap section active">
        <p style="letter-spacing: 5px; font-size: 0.8rem; color: #d4af37; margin-bottom: 10px;">EST. 2026</p>
        <h1 style="font-size: 2.2rem; font-weight: 400; margin-bottom: 40px; letter-spacing: 8px;">VRIME HERITAGE</h1>
        
        <div class="luxury-card">
            <div class="card-inner">
                <div class="main-photo">
                    <img src="static/nicole.jpg" alt="Member">
                </div>
                <div class="card-info">
                    <p>Privileged Member</p>
                    <h2>N. Kidman</h2>
                    <div style="margin-top: 40px;">
                        <img src="https://bwipjs-api.metafloor.com/?bcid=code128&text=VIP772&scale=1&includetext=false&backgroundcolor=111111&barcolor=d4af37" style="height: 30px; opacity: 0.7;">
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn-luxury" onclick="showStep('step-setup')">ENTER PRIVATE SUITE</button>
    </div>

    <script>
        function showStep(stepId) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            const el = document.getElementById(stepId);
            el.style.display = 'flex';
        }
    </script>
</body>
</html>
